services:
  nginx:
    image: nginx:1.25-alpine
    container_name: wepick_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/nginx/conf.d:/etc/nginx/conf.d:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    image: ${FE_IMAGE:?FE_IMAGE is required}:${FE_IMAGE_TAG:?FE_IMAGE_TAG is required}
    container_name: wepick_frontend
    expose:
      - "3000"
    restart: unless-stopped

  backend:
    image: ${BE_IMAGE:?BE_IMAGE is required}:${BE_IMAGE_TAG:?BE_IMAGE_TAG is required}
    container_name: wepick_backend
    expose:
      - "8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://${MYSQL_HOST:?MYSQL_HOST is required}:${MYSQL_PORT:?MYSQL_PORT is required}/${MYSQL_DATABASE:?MYSQL_DATABASE is required}
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:?MYSQL_USER is required}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
      AWS_REGION: ${AWS_REGION:-ap-northeast-2}
      SESSION_COOKIE_SECURE: "true"
      SESSION_COOKIE_SAME_SITE: ${SESSION_COOKIE_SAME_SITE:?SESSION_COOKIE_SAME_SITE is required}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?CORS_ALLOWED_ORIGINS is required}
      CLOUD_AWS_S3_DOMAIN: ${CLOUD_AWS_S3_DOMAIN:?CLOUD_AWS_S3_DOMAIN is required}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:?S3_BUCKET_NAME is required}
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: wepick_mysql
    expose:
      - "3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      MYSQL_DATABASE: ${MYSQL_DATABASE:?MYSQL_DATABASE is required}
      MYSQL_USER: ${MYSQL_USER:?MYSQL_USER is required}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  mysql_data:
